<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Acceso Alumnos | Hugo Alvigini</title>
  <meta name="description" content="Área de alumnos de Hugo Alvigini. Accede a tus herramientas de automatización.">

  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dlnrsadbc/image/upload/w_32,h_32,c_fill,q_auto,f_auto/v1762869486/Gemini_Generated_Image_nm1t21nm1t21nm1t_s7w9li.png">

  <link rel="preload" as="image" href="https://res.cloudinary.com/dlnrsadbc/image/upload/q_auto,f_auto/organic_integration_e3g66o.webp" fetchpriority="high">
  <link rel="preload" as="image" href="https://res.cloudinary.com/dlnrsadbc/image/upload/v1778806879/Gemini_Generated_Image_nm1t21nm1t21nm1t_s7w9li_1_1_uos6ak.webp" fetchpriority="high">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">
  
  <style>
    :root { 
      --platform-dark: #1a1f36; 
      --accent-blue: #3b82f6; 
      --whatsapp-green: #25D366; 
    }
    
    html, body { 
      height: 100%; 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
    }

    /* 🖼️ FONDO LIMPIO Y SIN DISTRACCIONES */
    .bg-container {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%;
      background-image: url('https://res.cloudinary.com/dlnrsadbc/image/upload/q_auto,f_auto/organic_integration_e3g66o.webp'); 
      background-size: cover; 
      background-position: center center; 
      z-index: -2;
    }
    
    .bg-overlay {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%;
      background: rgba(0, 0, 0, 0.03); 
      z-index: -1;
    }

    body { 
      font-family: 'Open Sans', sans-serif; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      min-height: 100vh; 
      padding: 0 5%; 
      position: relative; 
      box-sizing: border-box;
    }

    .login-box {
      background: #ffffff; 
      padding: 65px 35px 30px 35px; 
      border-radius: 24px; 
      box-shadow: 0 20px 50px rgba(26, 31, 54, 0.2); 
      width: 100%; 
      max-width: 350px; 
      text-align: center; 
      position: relative; 
      z-index: 10;
    }

    .avatar-profile {
      position: absolute;
      top: -55px; 
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background-image: url('https://res.cloudinary.com/dlnrsadbc/image/upload/v1778806879/Gemini_Generated_Image_nm1t21nm1t21nm1t_s7w9li_1_1_uos6ak.webp');
      background-size: cover;
      background-position: center;
      border: 4px solid #ffffff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .promo-badge {
      display: inline-block; 
      padding: 5px 14px; 
      border-radius: 20px; 
      font-size: 0.72em; 
      font-weight: 700; 
      text-transform: uppercase;
      background-color: #15803d !important; 
      color: white; 
      margin-bottom: 22px; 
      letter-spacing: 0.5px;
    }

    h1 { font-family: 'Montserrat', sans-serif; color: var(--platform-dark); font-size: 1.8em; margin-bottom: 4px; margin-top: 0; }
    h2 { font-size: 0.9em; color: #4b5563; margin-bottom: 25px; font-weight: 400; margin-top: 0; }

    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #1f2937; font-size: 0.88em; }
    
    input { 
      width: 100%; 
      padding: 12px 14px; 
      border: 1px solid #d1d5db; 
      border-radius: 10px; 
      font-size: 0.95em; 
      box-sizing: border-box; 
      transition: all 0.2s ease; 
      background-color: #f9fafb;
    }
    input:focus { 
      border-color: var(--accent-blue); 
      background-color: #ffffff;
      outline: none; 
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12); 
    }

    .btn-primary {
      width: 100%; 
      padding: 14px; 
      background-color: #1a1f36 !important; 
      color: #ffffff !important;
      border: none; 
      border-radius: 10px; 
      font-size: 1em; 
      font-weight: 700; 
      cursor: pointer; 
      transition: background-color 0.2s ease;
      margin-top: 5px;
    }
    .btn-primary:hover { background-color: #2e3554 !important; }

    /* 📝 NUEVO DISEÑO SUTIL PARA LA FRASE DENTRO DEL LOGIN */
    .login-quote {
      margin: 22px 0 10px 0;
      padding: 12px 0 0 0;
      border-top: 1px dashed #e5e7eb;
      text-align: center;
    }
    .login-quote p {
      font-style: italic;
      color: #4b5563;
      font-size: 0.82em;
      line-height: 1.4;
      margin: 0 0 4px 0;
    }
    .login-quote span {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.7em;
      text-transform: uppercase;
      color: var(--accent-blue);
      letter-spacing: 0.5px;
    }

    .btn-packs-link {
      display: inline-flex; 
      align-items: center; 
      gap: 6px; 
      margin-top: 14px;
      color: #2563eb !important; 
      font-size: 0.85em; 
      font-weight: 600; 
      text-decoration: none; 
      transition: color 0.2s ease;
    }
    .btn-packs-link:hover { color: #1d4ed8 !important; text-decoration: underline; }

    .whatsapp-bubble { 
      position: fixed; 
      bottom: 35px; 
      right: 25px; 
      width: 55px; 
      height: 55px; 
      background-color: var(--whatsapp-green); 
      border-radius: 50%; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      z-index: 100; 
      border: 3px solid white; 
      transition: transform 0.3s ease; 
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .whatsapp-bubble:hover { transform: scale(1.08); }

    @media (max-width: 950px) {
      body { 
        justify-content: center; 
        padding: 0; 
      }
      .bg-container { background-position: 30% center; } 
      .login-box { width: 88%; padding: 60px 22px 25px 22px; }
    }
  </style>
</head>
<body>

  <div class="bg-container"></div>
  <div class="bg-overlay"></div>

  <div class="login-box">
    <div class="avatar-profile"></div>
    <div class="promo-badge"><i class="fas fa-rocket"></i> Pensando en el Emprendedor</div>
    <h1>Hugo Alvigini</h1>
    <h2>Ingresa a tu academia</h2>
     
    <form id="loginForm">
      <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="tu@email.com">
      </div>
      <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required placeholder="••••••••"> 
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Entrar a mis Cursos</button>
    </form>

    <div class="login-quote">
      <p>"El conocimiento que adquieras hoy es el sistema que sostendrá tu crecimiento mañana."</p>
      <span>— Hugo Alvigini</span>
    </div>

    <a href="https://hugo85ar.github.io/LandingPacks/" class="btn-packs-link" target="_blank">
      <i class="fas fa-layer-group"></i> Ver Packs de Automatización e IA
    </a>
  </div>

  <a href="https://wa.me/5491136151754?text=%C2%A1Hola%20Hugo%21%20Soy%20alumno%20de%20la%20Plataforma%20de%20Cursos.%20Estoy%20adentro%20del%20aula%20y%20te%20quer%C3%ADa%20hacer%20una%20consulta%20sobre%20las%20clases%20o%20herramientas." 
   class="whatsapp-bubble" target="_blank" aria-label="Soporte por WhatsApp">
  <i class="fab fa-whatsapp" style="color: white; font-size: 30px;"></i>
</a>
  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLOXOGA8rMYKyxGrYPNtDo7ZFUlUeQjDRAgrfhSJk2p44pzzHdtx-ZQ9U7JW0bd5wJvQ/exec";

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      btn.innerText = 'Verificando...';
      btn.disabled = true;

      try {
        const response = await fetch(`${WEB_APP_URL}?action=login&email=${encodeURIComponent(email)}&pass=${encodeURIComponent(pass)}`);
        const data = await response.json();
        if (data.status === "success") {
           localStorage.setItem('userToken', data.token);
           localStorage.setItem('userEmail', email);
           localStorage.setItem('userName', data.nombre);
           window.location.href = "dashboard.html";
        } else {
           alert("Error: " + data.message);
           btn.innerText = 'Entrar a mis Cursos';
           btn.disabled = false;
        }
      } catch (err) {
         alert("Error de conexión. Inténtalo de nuevo.");
         btn.innerText = 'Entrar a mis Cursos';
         btn.disabled = false;
      }
    });
  </script>
</body>
</html>
